<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deleted Hosts - ReUptime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Immediate dark mode script -->
    <script>
        // Check for dark mode preference (localStorage is faster than cookies)
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode-preload');
            document.body.classList.add('dark-mode-preload');
            
            // We need to set this after the DOM is loaded
            document.addEventListener('DOMContentLoaded', function() {
                const navbar = document.querySelector('.navbar');
                if (navbar) {
                    navbar.classList.remove('navbar-light', 'bg-light');
                    navbar.classList.add('navbar-dark', 'bg-dark');
                }
                
                const darkModeToggle = document.getElementById('darkModeToggle');
                if (darkModeToggle) {
                    darkModeToggle.classList.remove('btn-outline-secondary');
                    darkModeToggle.classList.add('btn-outline-light');
                }
            });
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">ReUptime</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Hosts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/deleted_hosts">Deleted Hosts</a>
                    </li>
                </ul>
                <!-- Dark Mode Toggle in Navbar -->
                <div class="nav-item">
                    <button class="btn btn-outline-secondary" id="darkModeToggle">
                        <i class="fas fa-moon"></i>
                        <span class="ms-2 d-none d-md-inline">Toggle Dark Mode</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Deleted Hosts</h1>
        </div>
        
        <div class="card">
            <div class="card-header">
                Deleted Hosts
            </div>
            <div class="card-body">
                <table class="table" id="deletedHostsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>IP</th>
                            <th>Region</th>
                            <th>Status</th>
                            <th>Deleted At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Table rows will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast container will be created by JavaScript -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/deleted_hosts.js"></script>
</body>
</html>
